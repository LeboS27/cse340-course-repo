<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" role="img" aria-label="HealthTech Access organization logo">
  <title>HealthTech Access</title>
  <rect width="280" height="180" fill="#97266d" rx="12"/>
  <!-- Medical cross -->
  <rect x="126" y="55" width="28" height="70" rx="6" fill="rgba(255,255,255,0.25)"/>
  <rect x="105" y="76" width="70" height="28" rx="6" fill="rgba(255,255,255,0.25)"/>
  <!-- Heartbeat line -->
  <polyline
    points="52,110  88,110  100,85  112,135  124,90  136,110  152,110  160,98  172,110  228,110"
    fill="none"
    stroke="#fbd38d"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Org name -->
  <text x="140" y="168" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="1">HEALTHTECH ACCESS</text>
</svg>
