<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" role="img" aria-label="Digital Equity Now organization logo">
  <title>Digital Equity Now</title>
  <rect width="280" height="180" fill="#276749" rx="12"/>
  <!-- Network nodes -->
  <circle cx="140" cy="75" r="18" fill="#ffffff"/>
  <circle cx="80"  cy="120" r="14" fill="rgba(255,255,255,0.8)"/>
  <circle cx="200" cy="120" r="14" fill="rgba(255,255,255,0.8)"/>
  <!-- Connecting lines -->
  <line x1="140" y1="93"  x2="86"  y2="108" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="93"  x2="194" y2="108" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="94"  y1="120" x2="186" y2="120" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-dasharray="6,4"/>
  <!-- WiFi arc on centre node -->
  <path d="M128 68 Q140 57 152 68" stroke="#fbd38d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M122 62 Q140 47 158 62" stroke="#fbd38d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Org name -->
  <text x="140" y="168" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">DIGITAL EQUITY NOW</text>
</svg>
